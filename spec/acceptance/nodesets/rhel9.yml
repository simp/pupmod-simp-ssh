---
HOSTS:
  rhel9-server:
    roles:
    - default
    - master
    - server
    - el9
    platform: el-9-x86_64
    box: generic/rhel9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
  rhel9-client:
    roles:
    - client
    - el9
    platform: el-9-x86_64
    box: generic/rhel9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
