---
HOSTS:
  rocky10-server:
    roles:
    - default
    - master
    - server
    - el10
    platform: el-10-x86_64
    box: rockylinux/10
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
  rocky10-client:
    roles:
    - client
    - el10
    platform: el-10-x86_64
    box: rockylinux/10
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
