---
HOSTS:
  centos9-server:
    roles:
    - default
    - master
    - server
    - el9
    platform: el-9-x86_64
    hypervisor: docker
    image: quay.io/centos/centos:stream9
    docker_cmd: '/usr/sbin/init'
    docker_preserve_image: true
    docker_image_commands:
      - 'yum install -y rsync openssl openssh-server openssh-clients passwd shadow-utils cracklib-dicts'
    dockeropts:
      HostConfig:
        Memory: 1073741824
        Privileged: true
  centos9-client:
    roles:
    - client
    - el9
    platform: el-9-x86_64
    hypervisor: docker
    image: quay.io/centos/centos:stream9
    docker_cmd: '/usr/sbin/init'
    docker_preserve_image: true
    docker_image_commands:
      - 'yum install -y rsync openssl openssh-server openssh-clients passwd shadow-utils cracklib-dicts'
    dockeropts:
      HostConfig:
        Memory: 1073741824
        Privileged: true
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
